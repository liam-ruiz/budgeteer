<div class="auth-page">
    <div class="auth-card card-glass animate-in">
        <div class="auth-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="auth-icon">
                <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" />
                <path d="M3 5v14a2 2 0 0 0 2 2h16v-5" />
                <path d="M18 12a2 2 0 0 0 0 4h4v-4Z" />
            </svg>
            <h1>Create an account</h1>
            <p>Get started with Budget</p>
        </div>

        @if (error()) {
        <div class="auth-error">{{ error() }}</div>
        }

        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="you@example.com" [(ngModel)]="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="••••••••" [(ngModel)]="password" name="password"
                    required>
            </div>
            <button type="submit" class="btn btn-primary auth-submit" [disabled]="loading()">
                {{ loading() ? 'Creating account…' : 'Create Account' }}
            </button>
        </form>

        <p class="auth-footer">
            Already have an account? <a routerLink="/login">Sign in</a>
        </p>
    </div>
</div>
